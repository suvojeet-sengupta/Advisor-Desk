name: advisor_desk
description: "Advisor Desk Performance Tracker."
publish_to: 'none'

version: 1.0.8+6

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  intl: ^0.19.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
