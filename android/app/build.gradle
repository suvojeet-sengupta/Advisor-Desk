plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.suvojeet.advisordesk"
    compileSdk 36 // Updated for plugin compatibility

    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.suvojeet.advisordesk"
        minSdk 21
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            // Only configure signing if key.properties exists
            def keyPropertiesFile = rootProject.file('key.properties')
            if (keyPropertiesFile.exists()) {
                def keyProperties = new Properties()
                keyPropertiesFile.withReader { reader ->
                    keyProperties.load(reader)
                }
                storeFile file("../" + keyProperties['storeFile'])
                storePassword keyProperties['storePassword']
                keyAlias keyProperties['keyAlias']
                keyPassword keyProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            // Only use signing config if key.properties exists
            if (rootProject.file('key.properties').exists()) {
                signingConfig signingConfigs.release
            }
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

flutter {
    source '../..'
}

// Pin androidx.glance to a stable version. The home_widget plugin requests
// Glance with a dynamic version, which now resolves to 1.3.0-alpha01 — that
// alpha requires compileSdk 37 / AGP 9.1+, breaking the release build on the
// current toolchain (compileSdk 36 / AGP 8.6). Forcing the stable 1.1.1 keeps
// the build green and also drops the compose.remote alpha it pulls in.
configurations.all {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'androidx.glance') {
            details.useVersion '1.1.1'
            details.because 'glance 1.3.0-alpha01 needs compileSdk 37/AGP 9.1; pin to stable'
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
