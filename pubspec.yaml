name: advisor_desk
description: "Advisor Desk Performance Tracker."
publish_to: 'none'

version: 1.1.0+33

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_svg: ^2.2.0
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  intl: ^0.19.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  open_file: ^3.5.10
  device_info_plus: ^10.1.0
  pdf: ^3.10.8 # Add this line for PDF generation
  share_plus: ^11.0.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3 # <-- यह नया पैकेज जोड़ा गया है
  url_launcher: ^6.3.0
  excel: ^2.1.0
  in_app_update: ^4.2.3 # Add this line for in-app updates
  google_mobile_ads: ^6.0.0
  flutter_local_notifications: ^19.4.0
  timezone: ^0.10.1
  image_picker: ^1.2.0
  file_picker: ^10.3.2
  in_app_review: ^2.0.10 # Added for in-app review
  dynamic_color: ^1.8.1
  flutter_slidable: ^3.1.0
  package_info_plus: ^8.0.0
  archive: ^3.6.1


  screenshot: ^3.0.0
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  change_app_package_name: ^1.1.0 # <-- यह लाइन जोड़ें

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/
    - assets/web/
    - assets/fonts/
