  pdf: ^3.10.8 # Add this line for PDF generation
  share_plus: ^11.0.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3 # <-- यह नया पैकेज जोड़ा गया है
  url_launcher: ^6.3.0
  excel: ^2.1.0
  file_picker: ^10.2.0
  
  screenshot: ^3.0.0

dev_dependencies:
