plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.suvojeet.advisordesk"
    compileSdk 36 // Updated for plugin compatibility

    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.suvojeet.advisordesk"
        minSdk 21
        targetSdk 35 // आप चाहें तो इसे भी 35 कर सकते हैं, पर जरूरी नहीं है
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            storeFile file('../key.properties').withReader { reader ->
                def props = new Properties()
                props.load(reader)
                return file("../" + props['storeFile'])
            }
            storePassword rootProject.file('key.properties').withReader { reader ->
                def props = new Properties()
                props.load(reader)
                return props['storePassword']
            }
            keyAlias rootProject.file('key.properties').withReader { reader ->
                def props = new Properties()
                props.load(reader)
                return props['keyAlias']
            }
            keyPassword rootProject.file('key.properties').withReader { reader ->
                def props = new Properties()
                props.load(reader)
                return props['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
